<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Old Beats — Blanco</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Manrope', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .back-link {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: rgba(255,255,255,0.4);
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            color: rgba(255,255,255,0.8);
        }

        .block {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 1rem;
            padding: 3rem 3.5rem;
            text-align: center;
            max-width: 420px;
            width: 90%;
            animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .block-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .block h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            font-weight: 600;
            color: #000;
            line-height: 1.3;
            margin-bottom: 0.75rem;
        }

        .block p {
            font-size: 0.8rem;
            color: rgba(0,0,0,0.4);
            font-weight: 400;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <iconify-icon icon="solar:arrow-left-linear" class="text-base"></iconify-icon>
        Back to profile
    </a>

    <div class="block">
        <div class="block-icon">
            <iconify-icon icon="solar:cloud-upload-bold" class="text-white text-xl"></iconify-icon>
        </div>
        <h1>Files not updated yet!</h1>
        <p>Check again tomorrow</p>
    </div>

</body>
</html>
